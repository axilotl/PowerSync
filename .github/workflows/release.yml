name: Create Release on Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'custom_components/power_sync/manifest.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/power_sync/manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Check both v-prefixed and bare tags to avoid duplicates
          if git rev-parse "v$VERSION" >/dev/null 2>&1 || git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v$VERSION or $VERSION already exists — skipping release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        if: steps.check_tag.outputs.exists == 'false'
        id: notes
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"

          # Prefer a hand-written RELEASE_NOTES.md if it exists (for
          # feature releases with user-friendly descriptions), but only
          # when it is explicitly marked for this manifest version. This
          # prevents stale notes from a previous release being reused if
          # the cleanup commit failed or was bypassed.
          if [ -f "RELEASE_NOTES.md" ] && [ -s "RELEASE_NOTES.md" ]; then
            echo "Using hand-written RELEASE_NOTES.md"
            export VERSION
            python3 - <<'PY' > /tmp/release_notes.md
          import os
          import re
          import sys
          from pathlib import Path

          version = os.environ["VERSION"]
          path = Path("RELEASE_NOTES.md")
          text = path.read_text()
          marker = re.compile(
              r"^\s*<!--\s*release:\s*v?([0-9]+(?:\.[0-9]+){2}(?:[-+][A-Za-z0-9_.-]+)?)\s*-->\s*",
              re.IGNORECASE,
          )
          match = marker.match(text)
          expected = f"<!-- release: v{version} -->"
          if not match:
              print(
                  f"::error::Hand-written RELEASE_NOTES.md must start with {expected} "
                  "so stale notes cannot be reused.",
                  file=sys.stderr,
              )
              sys.exit(1)

          notes_version = match.group(1)
          if notes_version != version:
              print(
                  f"::error::RELEASE_NOTES.md is marked for v{notes_version}, "
                  f"but manifest.json is v{version}. Update the marker before releasing.",
                  file=sys.stderr,
              )
              sys.exit(1)

          notes = text[match.end():].lstrip()
          if not notes.strip():
              print(
                  "::error::RELEASE_NOTES.md marker is present but no release notes were found.",
                  file=sys.stderr,
              )
              sys.exit(1)

          sys.stdout.write(notes)
          PY
          else
            echo "No RELEASE_NOTES.md found, generating from commits"
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              RANGE="$PREV_TAG..HEAD"
              echo "Generating notes from $RANGE"
            else
              RANGE="HEAD~20..HEAD"
              echo "No previous tag found, using last 20 commits"
            fi

            echo "## What's Changed" > /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md

            git log --pretty=format:"### %s%n%n%b" "$RANGE" -- custom_components/ \
              | grep -v "^### Bump version" \
              | grep -v "^### docs(release)" \
              | grep -v "^### chore(manifest)" \
              | sed '/^$/N;/^\n$/d' >> /tmp/release_notes.md

            echo "" >> /tmp/release_notes.md
            echo "Update available via HACS" >> /tmp/release_notes.md
          fi

          echo "--- Release notes ---"
          head -30 /tmp/release_notes.md

      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" \
            --title "PowerSync v$VERSION" \
            --notes-file /tmp/release_notes.md
          echo "Created release v$VERSION"

      # NOTE: the separate manual-release Discord workflow will not fire here,
      # because GitHub Actions intentionally suppresses downstream workflows for
      # release events triggered by GITHUB_TOKEN. Posting to Discord directly in
      # this job is the only reliable path for automated manifest releases.
      - name: Build Discord payloads
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          marker_path = Path(".github/discord-release-last-posted.txt")
          last_posted = marker_path.read_text().strip() if marker_path.exists() else ""
          target_tag = f"v{os.environ['VERSION']}"

          releases = json.loads(
              subprocess.check_output(
                  [
                      "gh",
                      "api",
                      f"repos/{os.environ['GITHUB_REPOSITORY']}/releases?per_page=20",
                  ],
                  text=True,
              )
          )
          releases = [release for release in releases if not release.get("draft")]

          tags = [release["tag_name"] for release in releases]
          try:
              target_index = tags.index(target_tag)
          except ValueError as exc:
              raise SystemExit(f"Release tag {target_tag} was not found") from exc

          if last_posted in tags:
              marker_index = tags.index(last_posted)
              selected = releases[target_index:marker_index] if marker_index > target_index else []
          else:
              # First run or marker aged out of the API page: post only the
              # current release to avoid spamming historical releases.
              selected = [releases[target_index]]

          selected = list(reversed(selected))

          payload_dir = Path("/tmp/discord_release_payloads")
          payload_dir.mkdir(parents=True, exist_ok=True)
          tags_to_post: list[str] = []

          for index, release in enumerate(selected):
              tag = release["tag_name"]
              name = release.get("name") or tag
              notes = (release.get("body") or "").strip()
              url = release["html_url"]

              if tag == target_tag:
                  notes = Path("/tmp/release_notes.md").read_text().strip()

              if not notes:
                  raise SystemExit(f"Release {tag} has no notes; refusing to post an empty Discord update.")

              if len(notes) > 4000:
                  notes = notes[:3997] + "..."

              payload = {
                  "allowed_mentions": {"parse": []},
                  "embeds": [
                      {
                          "title": f"🚀 {name} Released",
                          "description": notes,
                          "color": 5025616,
                          "url": url,
                          "footer": {"text": "Update available via HACS"},
                      }
                  ],
              }
              (payload_dir / f"{index}.json").write_text(json.dumps(payload))
              tags_to_post.append(tag)

          Path("/tmp/discord_release_tags.txt").write_text(
              "\n".join(tags_to_post) + ("\n" if tags_to_post else "")
          )
          Path("/tmp/discord_release_count.txt").write_text(str(len(tags_to_post)))

          if tags_to_post:
              print("Discord releases to post: " + ", ".join(tags_to_post))
          else:
              print(f"No Discord release notifications needed; last marker is {last_posted or 'empty'}")
          PY

      # urllib's default User-Agent is blocked by Discord's webhook spam filter
      # (returns 403), so curl is required.
      - name: Notify Discord
        if: steps.check_tag.outputs.exists == 'false'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          set -euo pipefail

          COUNT=$(cat /tmp/discord_release_count.txt)
          if [ "$COUNT" = "0" ]; then
            echo "No pending Discord release notifications"
            exit 0
          fi

          : > /tmp/discord_release_posted_tags.txt
          for index in $(seq 0 $((COUNT - 1))); do
            tag=$(sed -n "$((index + 1))p" /tmp/discord_release_tags.txt)
            payload="/tmp/discord_release_payloads/$index.json"

            HTTP_CODE=$(curl -sS -o /tmp/discord_response.txt -w "%{http_code}" \
              -H "Content-Type: application/json" \
              --data-binary @"$payload" \
              "$DISCORD_WEBHOOK")

            echo "Discord webhook HTTP status for $tag: $HTTP_CODE"
            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "Discord webhook failed for $tag:"
              cat /tmp/discord_response.txt
              exit 1
            fi

            echo "$tag" >> /tmp/discord_release_posted_tags.txt
          done

      - name: Clear release notes and record Discord marker
        if: steps.check_tag.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          MARKER_PATH=".github/discord-release-last-posted.txt"

          # Prevent stale hand-written notes from being reused on the
          # next version bump. Also record the Discord notification marker
          # only after the webhook succeeds, so scheduled backfill can catch
          # any missed release later without duplicating successful posts.
          echo -n "" > RELEASE_NOTES.md
          if [ -s /tmp/discord_release_posted_tags.txt ]; then
            tail -n 1 /tmp/discord_release_posted_tags.txt > "$MARKER_PATH"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RELEASE_NOTES.md "$MARKER_PATH"
          if git diff --cached --quiet; then
            echo "No release cleanup changes to commit"
          else
            git commit -m "docs(release): clear RELEASE_NOTES.md after v$VERSION"
            git push origin main
            echo "Cleared RELEASE_NOTES.md and recorded Discord marker v$VERSION"
          fi
