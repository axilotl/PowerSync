name: Create Release on Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'custom_components/power_sync/manifest.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/power_sync/manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        if: steps.check_tag.outputs.exists == 'false'
        id: notes
        run: |
          # Prefer RELEASE_NOTES.md committed alongside the version bump.
          # This is the canonical source — fall back to commit-log generation
          # only when the file is missing or empty.
          if [ -s RELEASE_NOTES.md ]; then
            cp RELEASE_NOTES.md /tmp/release_notes.md
            echo "Using RELEASE_NOTES.md from repository"
          else
            echo "RELEASE_NOTES.md missing or empty — generating from commits"
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              RANGE="$PREV_TAG..HEAD"
            else
              RANGE="HEAD~20..HEAD"
            fi
            echo "## What's Changed" > /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
            git log --pretty=format:"### %s%n%n%b%n---" "$RANGE" -- custom_components/ \
              | grep -v "^### Bump version" \
              | grep -v "^---$" \
              | sed '/^$/N;/^\n$/d' >> /tmp/release_notes.md
          fi

      - name: Create tag and release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" \
            --title "v$VERSION" \
            --notes-file /tmp/release_notes.md
          echo "Created release v$VERSION"

      # NOTE: discord-notify.yml triggers on `release: published`, but
      # GitHub Actions intentionally does NOT fire downstream workflows
      # for events caused by GITHUB_TOKEN. Since `gh release create`
      # above uses GITHUB_TOKEN, that workflow never runs. Posting to
      # Discord directly here ensures we always get exactly one message
      # with the populated release body.
      - name: Notify Discord
        if: steps.check_tag.outputs.exists == 'false'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE_URL="https://github.com/bolagnaise/PowerSync/releases/tag/$VERSION"
          python3 - <<PYEOF
          import json, os, urllib.request

          with open('/tmp/release_notes.md', 'r') as f:
              notes = f.read().strip()
          if len(notes) > 4000:
              notes = notes[:3997] + '...'

          payload = {
              'embeds': [{
                  'title': f'🚀 PowerSync v$VERSION Released',
                  'description': notes,
                  'color': 5025616,
                  'url': '$RELEASE_URL',
                  'footer': {'text': 'Update available via HACS'},
              }]
          }

          req = urllib.request.Request(
              os.environ['DISCORD_WEBHOOK'],
              data=json.dumps(payload).encode('utf-8'),
              headers={'Content-Type': 'application/json'},
              method='POST',
          )
          with urllib.request.urlopen(req) as resp:
              print(f'Discord webhook status: {resp.status}')
          PYEOF
          echo "Discord notified for v$VERSION"
